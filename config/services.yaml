services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Model/'
            - '../src/Kernel.php'

    # Adapter services - must have app.cms_adapter tag for AdapterRegistry
    App\Adapter\WordPress\WordPressAdapter:
        arguments:
            $client: '@http_client'
            $baseUrl: '%env(WORDPRESS_BASE_URL)%'
        tags:
            - { name: 'app.cms_adapter' }

    App\Adapter\Strapi\StrapiAdapter:
        arguments:
            $client: '@http_client'
            $baseUrl: '%env(STRAPI_BASE_URL)%'
        tags:
            - { name: 'app.cms_adapter' }

    App\Adapter\Contentful\ContentfulAdapter:
        arguments:
            $client: '@http_client'
            $spaceId: '%env(CONTENTFUL_SPACE_ID)%'
            $accessToken: '%env(CONTENTFUL_TOKEN)%'
        tags:
            - { name: 'app.cms_adapter' }

    App\Adapter\Storyblok\StoryblokAdapter:
        arguments:
            $client: '@http_client'
            $accessToken: '%env(STORYBLOK_TOKEN)%'
        tags:
            - { name: 'app.cms_adapter' }

    # Cache - use TagAware pool
    App\Cache\ContentCacheManager:
        arguments:
            $cache: '@cache.app.taggable'

    # Config loader
    App\Config\CmsConfigLoader:
        arguments:
            $config: '%cms_bridge.config%'

    # Image URL rewriter needs base URL
    App\Transformer\ImageUrlRewriter:
        arguments:
            $baseUrl: '%env(WORDPRESS_BASE_URL)%'
